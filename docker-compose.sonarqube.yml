version: "3.8"

services:
  sonarqube-db:
    image: postgres:14-alpine
    container_name: sonarqube_db
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonarSecurePassword123
      POSTGRES_DB: sonar
    volumes:
      - postgres_sonar_data:/var/lib/postgresql/data
    networks:
      - sonar-network

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube_server
    restart: always
    depends_on:
      - sonarqube-db
    ports:
      - "127.0.0.1:9000:9000" # Diikat ke localhost VM untuk keamanan
    environment:
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonarSecurePassword123
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - sonar-network

networks:
  sonar-network:
    name: sonar-network

volumes:
  postgres_sonar_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
