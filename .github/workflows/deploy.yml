name: Deploy StockVision to GCP VM

on:
  push:
    branches:
      - main_dply

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: 22
          script: |
            # 1. Masuk ke direktori proyek
            cd ${{ secrets.GCP_PROJECT_PATH }}
            
            # 2. Ambil perubahan terbaru dari branch main_dply
            git fetch origin main_dply
            git reset --hard origin/main_dply
            
            # 3. Jalankan pembaruan kontainer Docker
            # Menggunakan --build untuk membangun ulang image frontend/backend jika ada perubahan kode
            docker compose down
            docker compose up -d --build
            
            # 4. Bersihkan docker image lama yang menggantung (unused images) untuk menghemat penyimpanan VM
            docker image prune -f
